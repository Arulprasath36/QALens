# QaLens — Quality Assurance + Lens
# Example CI workflow: run your test suite, ingest the Allure/Extent report,
# then use QaLens's CI gate to break the build when failure counts exceed thresholds.
#
# Customise the threshold flags to match your team's quality bar.
# Exit code 2 = gate breached; exit code 1 = QaLens error; exit code 0 = pass.

name: QaLens Quality Gate

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-gate:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out code ──────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install your project + QaLens ────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      # ── 4. Run your test suite and generate an Allure report ──────────────
      #    Replace this block with your actual test runner command.
      #    The example below uses pytest with allure-pytest.
      - name: Run tests (generate Allure report)
        run: |
          pip install allure-pytest
          pytest --alluredir=allure-results || true   # don't fail here; let QaLens decide
          allure generate allure-results --clean -o allure-report

      # ── 5. Ingest the report into QaLens's local database ───────────────────
      #    This step is optional but enables flaky scoring across runs.
      - name: Ingest report into QaLens database
        run: |
          qalens ingest allure-report

      # ── 6. Run the QaLens CI gate ───────────────────────────────────────────
      #    Adjust thresholds to match your quality bar.
      #    --fail-on-defects 0   → fail on ANY product defect
      #    --fail-on-flaky   5   → allow up to 4 flaky tests before failing
      #    --fail-on-environment 3 → allow up to 2 environment failures
      #    --strict              → fail on any failure of any category
      - name: QaLens quality gate
        run: |
          qalens summarize allure-report \
            --format json \
            --out qalens-summary.json \
            --fail-on-defects 0 \
            --fail-on-environment 3
        # Exit code 2 = gate breached → step fails → job fails

      # ── 7. Upload QaLens summary as an artifact ─────────────────────────────
      - name: Upload QaLens summary
        if: always()   # upload even when gate fires
        uses: actions/upload-artifact@v4
        with:
          name: qalens-summary
          path: qalens-summary.json
          retention-days: 30

