# QA Lens single-job CI quality gate example.
#
# Use this when one CI job produces one complete report. If your tests run as
# parallel matrix shards, use examples/ci/github-actions-example.yml instead.
#
# Exit code 2 = quality gate breached.
# Exit code 1 = QA Lens error.
# Exit code 0 = pass.

name: QA Lens Quality Gate

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qalens

      - name: Run tests and generate report
        run: |
          # Replace this block with your real test command.
          # The example assumes JUnit XML output under reports/junit/.
          ./scripts/test.sh

      - name: Ingest report into QA Lens database
        run: |
          qalens ingest reports/junit --db qalens.db

      - name: QA Lens quality gate
        run: |
          qalens summarize reports/junit \
            --format json \
            --out qalens-summary.json \
            --fail-on-defects 0 \
            --fail-on-environment 3

      - name: Export QA Lens report
        if: always()
        run: |
          qalens report --db qalens.db --out qalens-report.html

      - name: Upload QA Lens outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qalens-output
          path: |
            qalens.db
            qalens-report.html
            qalens-summary.json
          retention-days: 30
