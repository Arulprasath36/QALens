# QA Lens fan-in CI example for parallel or matrix test jobs.
#
# Purpose:
# - Run module tests in parallel.
# - Upload each module's raw JUnit XML report.
# - Download all reports in one final job.
# - Ingest once so one QA Lens run equals one complete CI execution.
#
# If each matrix job calls `qalens ingest` independently, QA Lens will treat
# module shards as separate runs, which can make trend and regression analysis
# misleading.

name: QA Lens Fan-In

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        module: [auth, checkout, payments]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests for module
        run: |
          # Replace this with your real module test command.
          ./scripts/test-${{ matrix.module }}.sh

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.module }}
          path: reports/${{ matrix.module }}/junit/
          if-no-files-found: error

  qalens:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest

    # Use a single group if every branch writes to the same persisted DB.
    # Use github.ref if each branch has its own separate history.
    concurrency:
      group: qalens-db-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Download module reports
        uses: actions/download-artifact@v4
        with:
          path: qalens-input

      - name: Combine JUnit reports without filename collisions
        run: |
          mkdir -p qalens-merged/junit
          find qalens-input -name "*.xml" -type f | while read -r file; do
            artifact="$(echo "$file" | cut -d/ -f2)"
            cp "$file" "qalens-merged/junit/${artifact}-$(basename "$file")"
          done

      - name: Install QA Lens
        run: |
          python -m pip install --upgrade pip
          pip install qalens

      - name: Restore QA Lens database
        run: |
          # Optional: restore qalens.db from S3, GCS, Azure Blob, or another
          # storage location here. If no DB is restored, QA Lens starts a
          # fresh history for this workflow.
          echo "No persisted QA Lens database configured; starting fresh history."

      - name: Ingest merged report as one QA Lens run
        run: |
          qalens ingest qalens-merged/junit --db qalens.db

      - name: Export QA Lens report
        run: |
          qalens report --db qalens.db --out qalens-report.html

      - name: Upload QA Lens outputs
        uses: actions/upload-artifact@v4
        with:
          name: qalens-output
          path: |
            qalens.db
            qalens-report.html
          retention-days: 30
