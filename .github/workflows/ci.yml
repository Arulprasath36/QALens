name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    name: Frontend — lint / type-check / audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Security audit
        # Fail on high or critical CVEs; moderate ones are reported but non-blocking
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  # ─── Backend ────────────────────────────────────────────────
  backend:
    name: Backend — lint / type-check / test / audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev deps
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check src/ tests/

      - name: Ruff — format check
        run: ruff format --check src/ tests/

      - name: Mypy — type check
        run: mypy src/

      - name: Tests
        run: pytest tests/ -x --tb=short

      - name: pip-audit — dependency CVE scan
        run: |
          pip install pip-audit
          pip-audit --desc

      - name: Bandit — static security analysis
        run: |
          pip install bandit
          bandit -r src/ -ll -x src/qara/server/static/
