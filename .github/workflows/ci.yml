name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    name: Frontend — lint / type-check / audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Security audit
        # Fail on high or critical CVEs; moderate ones are reported but non-blocking
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  # ─── Backend ────────────────────────────────────────────────
  backend:
    name: Backend — lint / type-check / test / audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The repository predates enforcement of the full Ruff/Mypy ruleset.
      # Keep reporting the existing backlog without blocking unrelated PRs;
      # remove continue-on-error after the baseline cleanup is merged.
      - name: Ruff — lint (advisory until baseline cleanup)
        continue-on-error: true
        run: ruff check src/ tests/

      - name: Ruff — format check (advisory until baseline cleanup)
        continue-on-error: true
        run: ruff format --check src/ tests/

      - name: Mypy — type check (advisory until baseline cleanup)
        continue-on-error: true
        run: mypy src/

      - name: Tests
        run: pytest tests/ -x --tb=short

      - name: pip-audit — dependency CVE scan
        run: |
          pip install pip-audit
          pip-audit --desc

      # CodeQL remains the blocking SAST workflow. Bandit currently reports
      # an inherited SQL-construction/bind-address baseline that must be
      # reviewed before suppressions or refactors are accepted.
      - name: Bandit — static security analysis (advisory until baseline review)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r src/ -ll -x src/qalens/server/static/
