# ARI — Automated Root-cause Insights
# Example CI workflow: run your test suite, ingest the Allure/Extent report,
# then use ARI's CI gate to break the build when failure counts exceed thresholds.
#
# Customise the threshold flags to match your team's quality bar.
# Exit code 2 = gate breached; exit code 1 = ARI error; exit code 0 = pass.

name: ARI Quality Gate

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-gate:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out code ──────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install your project + ARI ─────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ari-insights          # install from PyPI
          # OR install from source:
          # pip install -e ".[dev]"

      # ── 4. Run your test suite and generate an Allure report ──────────────
      #    Replace this block with your actual test runner command.
      #    The example below uses pytest with allure-pytest.
      - name: Run tests (generate Allure report)
        run: |
          pip install allure-pytest
          pytest --alluredir=allure-results || true   # don't fail here; let ARI decide
          allure generate allure-results --clean -o allure-report

      # ── 5. Ingest the report into ARI's local database ────────────────────
      #    This step is optional but enables flaky scoring across runs.
      - name: Ingest report into ARI database
        run: |
          ari ingest allure-report

      # ── 6. Run the ARI CI gate ────────────────────────────────────────────
      #    Adjust thresholds to match your quality bar.
      #    --fail-on-defects 0   → fail on ANY product defect
      #    --fail-on-flaky   5   → allow up to 4 flaky tests before failing
      #    --fail-on-environment 3 → allow up to 2 environment failures
      #    --strict              → fail on any failure of any category
      - name: ARI quality gate
        run: |
          ari summarize allure-report \
            --format json \
            --out ari-summary.json \
            --fail-on-defects 0 \
            --fail-on-environment 3
        # Exit code 2 = gate breached → step fails → job fails

      # ── 7. Upload ARI summary as an artifact ──────────────────────────────
      - name: Upload ARI summary
        if: always()   # upload even when gate fires
        uses: actions/upload-artifact@v4
        with:
          name: ari-summary
          path: ari-summary.json
          retention-days: 30

